<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Niki's Garden 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --blush: #FFF0EB;
      --rose: #F9947E;
      --deep-rose: #c45c4a;
      --text: #3d2b25;
      --text-muted: #a07b6e;
      --border: #FFCFC7;
      --card-bg: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--blush);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      padding: 36px 20px 24px;
    }
    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(2rem, 6vw, 3rem);
      color: var(--deep-rose);
      letter-spacing: -0.5px;
    }
    .header p {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 6px;
      font-weight: 300;
    }

    /* ── WRAPPER SEARCH + BACK BUTTON (SAMPINGAN) ── */
    .top-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 0 16px 20px;
      flex-wrap: wrap;
    }
    
    /* BACK BUTTON - di samping search bar */
    .back-home {
      background: rgba(249, 148, 126, 0.12);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 10px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--deep-rose);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
      white-space: nowrap;
    }
    .back-home:hover {
      background: var(--rose);
      border-color: var(--rose);
      color: white;
      transform: translateX(-2px);
    }
    .back-home i {
      font-size: 0.85rem;
    }

    /* SEARCH BAR */
    .search-wrap {
      flex: 1;
      max-width: 380px;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 18px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: var(--rose); }
    .search-wrap input::placeholder { color: var(--text-muted); }

    /* Responsif: di HP, tombol dan search bisa stack atau tetap samping */
    @media (max-width: 550px) {
      .top-bar {
        flex-direction: column;
        align-items: stretch;
      }
      .search-wrap {
        max-width: 100%;
      }
      .back-home {
        justify-content: center;
        padding: 8px 16px;
      }
    }

    /* ── MASONRY GRID — True Pinterest-style ── */
    .masonry {
      columns: 4 200px;
      column-gap: 14px;
      padding: 4px 14px 60px;
    }

    /* Responsif kolom */
    @media (max-width: 900px) { .masonry { columns: 3 160px; } }
    @media (max-width: 600px) { .masonry { columns: 2 140px; column-gap: 10px; padding: 4px 10px 60px; } }
    @media (max-width: 340px) { .masonry { columns: 1; } }

    /* ── PIN CARD ── */
    .pin {
      break-inside: avoid;
      -webkit-column-break-inside: avoid;
      page-break-inside: avoid;
      margin-bottom: 14px;
      background: var(--card-bg);
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s;
      box-shadow: 0 2px 8px rgba(196,92,74,0.07);
      display: inline-block;
      width: 100%;
    }
    @media (max-width: 600px) { .pin { margin-bottom: 10px; border-radius: 14px; } }

    .pin:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 12px 28px rgba(196,92,74,0.15);
    }

    .pin img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .pin-info {
      padding: 10px 12px 13px;
    }
    .pin-caption {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .pin-date {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 300;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(30,10,8,0.88);
      z-index: 999;
      justify-content: center;
      align-items: center;
      padding: 20px;
      backdrop-filter: blur(6px);
    }
    .modal-overlay.open { display: flex; }

    .modal-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      max-width: 480px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      position: relative;
      animation: modalIn 0.25s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    .modal-card img {
      width: 100%;
      display: block;
      object-fit: cover;
      max-height: 65vh;
    }

    .modal-bottom {
      padding: 16px 20px;
      flex-shrink: 0;
    }
    .modal-bottom .caption { font-weight: 500; font-size: 0.9rem; color: var(--text); }
    .modal-bottom .date    { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

    .modal-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
    }
    .nav-btn {
      background: var(--blush);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      padding: 6px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--deep-rose);
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: #ffe4de; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }

    .modal-counter {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .modal-close {
      position: absolute;
      top: 12px; right: 14px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.45);
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      line-height: 1;
    }
    .modal-close:hover { background: rgba(0,0,0,0.7); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      display: none;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    footer span { color: var(--rose); }
  </style>
</head>
<body>

<div class="header">
  <h1>Niki's Garden</h1>
  <p>Every photo tells our story ✦</p>
</div>

<!-- SEARCH + BACK BUTTON SAMPINGAN -->
<div class="top-bar">
  <a href="#" onclick="goBackToHome(); return false;" class="back-home">
    ← Back to Home
  </a>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Cari kenangan..." oninput="filterPhotos()">
  </div>
</div>

<!-- Masonry Gallery -->
<div class="masonry" id="gallery"></div>
<div class="empty" id="emptyState">Tidak ada foto yang cocok 🌸</div>

<footer><span>♥</span> Every moment with you is worth remembering</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-card" id="modalCard">
    <button class="modal-close" onclick="closeModal()">×</button>
    <img id="modalImg" src="" alt="">
    <div class="modal-bottom">
      <div class="caption" id="modalCaption"></div>
      <div class="date"    id="modalDate"></div>
      <div class="modal-nav">
        <button class="nav-btn" id="btnPrev" onclick="navigate(-1)">← Sebelumnya</button>
        <span class="modal-counter" id="modalCounter"></span>
        <button class="nav-btn" id="btnNext" onclick="navigate(1)">Berikutnya →</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ======================================================
   DATA FOTO
====================================================== */
const photos = [
  { url: "https://lh3.googleusercontent.com/d/1_DK3bX7_XbBBD-yM8KPnnKW6TpH9hAOf", caption: "The First Bouquet", date: "May 2023" },
  { url: "https://lh3.googleusercontent.com/d/1rltJ8uu_Yc9wTbzRo9ZGtjIsFpEf1m6k", caption: "The First Handmade Bouquet", date: "June 2024" },
  { url: "https://lh3.googleusercontent.com/d/11Bo0-R9jQVS932nM6Xz_MGTarlMjH0w2", caption: "Girlfriend Day 😍", date: "August 2024" },
  { url: "https://lh3.googleusercontent.com/d/1XQys0KgfyXuus8kZAS_6tb8sd2jI8jnI", caption: "Gerbera will always be my favorite", date: "November 2024" },
  { url: "https://lh3.googleusercontent.com/d/15CruyK5sEfIrD5qanpwB7gAnJGNc-VdK", caption: "Sunflower and duckie kwek", date: "March 2025" },
  { url: "https://lh3.googleusercontent.com/d/1bLFDX25Az7MiYBkuI0zT1Pa6QtWP0x2W", caption: "Gerbera and Sunflower 🌸🌻", date: "April 2025" },
  { url: "https://lh3.googleusercontent.com/d/1YQCI7z7h_WMmdsmotCOnSpIrjj3Wz_e_", caption: "2nd Anniversary", date: "May 2025" },
  { url: "https://lh3.googleusercontent.com/d/1t_f3lfs77Ue2xLqEiKuEedef_7wLDKCD", caption: "Motoran sambil membawa bunga kicil", date: "June 2025" },
  { url: "https://lh3.googleusercontent.com/d/1xLZ4kINAzLiI1u-7t_Pa50NXWKwL7ykO", caption: "Always be my favortie", date: "July 2025" },
  { url: "https://lh3.googleusercontent.com/d/1QLkEvomMKQb3Nc7upS76FC3-5h1pyWiZ", caption: "Telat kasih bunga xixixi", date: "August 2025" },
  { url: "https://lh3.googleusercontent.com/d/1ThTtJdDkRVAB-GIMSdFk8nBNjK9he8Y0", caption: "My sweetest one", date: "September 2025" },
  { url: "https://lh3.googleusercontent.com/d/13ByMlWJZTMdNOyT0ont5wyy5yh6HV1Qj",  caption: "The Thumbelina!",      date: "Oktober 2025" },
  { url: "https://picsum.photos/id/33/400/400",  caption: "Taman kota yang asik 🌿",     date: "November 2025" },
  { url: "https://lh3.googleusercontent.com/d/1bjto9GAZwmY_rh62B_7xcY4lyJMA2Pf3", caption: "Beli bunga di Rawabelong 🌻",     date: "Desember 2025" },
  { url: "https://lh3.googleusercontent.com/d/1xoKItp3Cp-o3BLZYWquwlqIGQaAtMgrT", caption: "2nd handmade by me 🌻",          date: "January 2026" },
  { url: "https://lh3.googleusercontent.com/d/1s-SNkBHnyc9YFlAod7cyu64dFd-XL5Xa",  caption: "Early Val's gift",         date: "February 2026" },
  { url: "https://lh3.googleusercontent.com/d/1vLKY07kDU84di74e6S9LVC27_NW-liVi",  caption: "Back to sunflowers xixixi",            date: "March 2026" },
  { url: "https://lh3.googleusercontent.com/d/1wyJjMz4Q0bXvvexxILXWhkBDEyFgMcmq",  caption: "Korean bouquet sesuai keinginan Niki",           date: "April 2026" },
];

let filtered = [...photos];
let currentIdx = 0;

/* ── FUNGSI BACK TO HOME ── */
function goBackToHome() {
  window.location.href = 'index.html';
}

/* ── RENDER GALLERY ── */
function renderGallery(list) {
  const gallery = document.getElementById('gallery');
  const empty   = document.getElementById('emptyState');

  if (list.length === 0) {
    gallery.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  gallery.innerHTML = list.map((p, i) => `
    <div class="pin" onclick="openModal(${i})" role="button" tabindex="0"
         onkeydown="if(event.key==='Enter')openModal(${i})">
      <img src="${p.url}" alt="${p.caption}" loading="lazy">
      <div class="pin-info">
        <div class="pin-caption">${p.caption}</div>
        <div class="pin-date">${p.date}</div>
      </div>
    </div>
  `).join('');
}

/* ── SEARCH / FILTER ── */
function filterPhotos() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = photos.filter(p =>
    p.caption.toLowerCase().includes(q) || p.date.toLowerCase().includes(q)
  );
  renderGallery(filtered);
}

/* ── MODAL ── */
function openModal(idx) {
  currentIdx = idx;
  const p = filtered[idx];
  document.getElementById('modalImg').src        = p.url;
  document.getElementById('modalCaption').textContent = p.caption;
  document.getElementById('modalDate').textContent    = p.date;
  document.getElementById('modalCounter').textContent = `${idx + 1} / ${filtered.length}`;
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').disabled = idx === filtered.length - 1;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function navigate(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < filtered.length) openModal(next);
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('modalOverlay').classList.contains('open')) return;
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'Escape')     closeModal();
});

/* ── INIT ── */
renderGallery(photos);
</script>
</body>
</html>
